<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026春季高考 - 网络技术专业院校</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <style>
        :root {
            --bg: #F5F5F7; /* 极简暖浅灰 */
            --card-bg: #FFFFFF;
            --border: #242426; /* 柔和灰黑 */
            --shadow: #242426;
            --text: #242426;
            --text-sub: #636366;
            --text-muted: #8E8E93;
            
            /* 柔和马卡龙色系 */
            --pink: #FFCCD5;
            --blue: #C5E0F5;
            --yellow: #FDE2AE;
            --green: #D2EBD4;
            --purple: #E8D7F5;
            --accent: #E53935;
            
            --tag-chong-text: #B3003B;
            --tag-wen-text: #006600;
            --tag-bao-text: #005580;
            --tag-none-text: #666666;
            --tag-hard-text: #FFFFFF;
            
            --r-sm: 10px; --r-md: 16px; --t: 2.5px; /* 柔和圆角与边框线 */
        }
        .dark {
            --bg: #1A1A1C; /* 柔和暗夜灰 */
            --card-bg: #242426; /* 柔和卡片灰 */
            --border: #48484A; /* 柔和中灰边框，绝不刺眼 */
            --shadow: #0A0A0C;
            --text: #E5E5EA; /* 柔和灰白字 */
            --text-sub: #AEAEB2;
            --text-muted: #7C7C80;
            
            /* 保护视力、低饱和度微调 */
            --pink: #422228;
            --blue: #1B2E3C;
            --yellow: #3A301D;
            --green: #1C3322;
            --purple: #2C1D3A;
            --accent: #E5534B;
            
            --tag-chong-text: #FFB3C1;
            --tag-wen-text: #B4E3B9;
            --tag-bao-text: #A5D2F6;
            --tag-none-text: #AEAEB2;
            --tag-hard-text: #E5E5EA;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px 20px; line-height: 1.5; transition: all 0.3s; }
        .container { max-width: 1200px; margin: 0 auto; }

        header {
            background: var(--blue); border: var(--t) solid var(--border);
            border-radius: var(--r-md); padding: 30px; margin-bottom: 40px;
            box-shadow: 6px 6px 0 var(--shadow); text-align: center; position: relative;
        }
        header h1 { font-size: 2.2rem; margin-bottom: 10px; letter-spacing: 2px; }
        header p { font-size: 1rem; opacity: 0.8; }
        .header-actions { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .nav-link {
            display: inline-block; padding: 8px 20px;
            background: var(--yellow); border: 2px solid var(--border);
            border-radius: 20px; text-decoration: none; color: var(--text);
            font-weight: 700; font-size: 0.9rem; transition: all 0.15s; cursor: pointer;
        }
        .nav-link:hover { transform: translateY(-2px); box-shadow: 3px 3px 0 var(--shadow); }

        .theme-toggle {
            position: absolute; top: 15px; right: 15px;
            background: var(--card-bg); border: 2px solid var(--border);
            border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(15deg); }


        .card {
            background: var(--card-bg); border: var(--t) solid var(--border);
            border-radius: var(--r-md); padding: 25px; margin-bottom: 30px;
            box-shadow: 6px 6px 0 var(--shadow);
        }
        .card h2 {
            font-size: 1.4rem; margin-bottom: 20px; padding-bottom: 8px;
            border-bottom: var(--t) dashed var(--border); display: inline-block;
        }

        .stat-bar {
            display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;
            padding: 15px; background: var(--yellow); border: 2px solid var(--border); border-radius: var(--r-sm);
        }
        .stat-item { font-weight: 600; font-size: 0.9rem; }
        .stat-num { color: var(--accent); font-weight: 800; }

        .form-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; }
        .form-input {
            width: 100%; padding: 12px; border: var(--t) solid var(--border);
            border-radius: var(--r-sm); background: var(--card-bg); color: var(--text);
            outline: none; font-size: 1.05rem; transition: all 0.15s;
        }
        .form-input:focus { background: var(--yellow); box-shadow: 3px 3px 0 var(--shadow); }

        .rank-indicator {
            display: flex; align-items: center; gap: 15px; background: var(--purple);
            border: var(--t) solid var(--border); border-radius: var(--r-sm);
            padding: 12px 20px; font-weight: 700; box-shadow: 4px 4px 0 var(--shadow);
        }

        .filter-section { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-label { font-weight: 700; font-size: 0.85rem; width: 80px; }

        .filter-btn, .sort-btn {
            padding: 8px 16px; font-weight: 700; font-size: 0.85rem;
            border: 2px solid var(--border); border-radius: 20px;
            cursor: pointer; background: var(--card-bg); color: var(--text);
            transition: all 0.15s;
        }
        .filter-btn.active, .sort-btn.active { background: var(--yellow); box-shadow: 2px 2px 0 var(--shadow); }
        .filter-btn:hover, .sort-btn:hover { transform: translateY(-1px); }

        .sort-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        .sort-label { font-weight: 700; font-size: 0.9rem; margin-right: 5px; }

        .search-bar { margin-bottom: 20px; }
        .search-input {
            width: 100%; padding: 12px;
            border: var(--t) solid var(--border); border-radius: var(--r-sm);
            font-size: 1rem; background: var(--card-bg); color: var(--text);
            outline: none; transition: all 0.2s;
        }
        .search-input:focus { background: var(--blue); box-shadow: 3px 3px 0 var(--shadow); }
        .search-input::placeholder { color: var(--text-muted); }

        .tag-chong { background: var(--pink) !important; color: var(--tag-chong-text) !important; border-color: var(--border) !important; }
        .tag-wen { background: var(--green) !important; color: var(--tag-wen-text) !important; border-color: var(--border) !important; }
        .tag-bao { background: var(--blue) !important; color: var(--tag-bao-text) !important; border-color: var(--border) !important; }
        .tag-none { background: #e0e0e0 !important; color: var(--tag-none-text) !important; border-color: var(--border) !important; }
        .tag-hard { background: #333 !important; color: var(--tag-hard-text) !important; border-color: var(--border) !important; }

        .school-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .school-card {
            background: var(--card-bg); border: var(--t) solid var(--border);
            border-radius: var(--r-md); padding: 22px; position: relative;
            box-shadow: 5px 5px 0 var(--shadow); transition: all 0.2s;
        }
        .school-card:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0 var(--shadow); }
        .school-header { position: relative; margin-bottom: 12px; padding-right: 40px; }
        .school-name { font-size: 1.25rem; font-weight: 800; line-height: 1.3; display: inline-block; }
        .school-code {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--text-sub);
            font-weight: 700;
            background: var(--bg);
            border: 1.5px solid var(--border);
            padding: 2px 6px;
            border-radius: var(--r-sm);
            vertical-align: middle;
            margin-left: 8px;
            white-space: nowrap;
        }
        .school-info {
            font-size: 0.85rem;
            color: var(--text-sub);
            line-height: 1.8;
            margin-top: 12px;
            border-top: 1.5px dashed var(--border);
            padding-top: 10px;
        }
        .school-fee { font-size: 1.15rem; font-weight: 800; color: var(--accent); margin-top: 12px; }
        .school-note {
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 6px;
            font-weight: 700;
            background: rgba(229, 83, 75, 0.06);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1.5px dashed var(--accent);
            display: inline-block;
        }

        .major-highlight {
            display: inline-block; padding: 5px 12px; margin: 6px 0;
            background: var(--green); border: 2px solid var(--border);
            border-radius: var(--r-sm); font-weight: 700; font-size: 0.95rem;
        }
        .rank-highlight {
            display: inline-block; padding: 8px 14px; margin-top: 12px;
            background: var(--yellow); border: 2px solid var(--border);
            border-radius: var(--r-sm); font-weight: 800; font-size: 0.95rem; width: 100%; text-align: center;
            box-shadow: 2px 2px 0 var(--shadow);
        }
        .no-rank {
            display: inline-block; padding: 8px 14px; margin-top: 12px;
            background: var(--purple); border: 2px solid var(--border);
            border-radius: var(--r-sm); font-size: 0.85rem; color: var(--text-sub); font-weight: 700; width: 100%; text-align: center;
            box-shadow: 2px 2px 0 var(--shadow);
        }

        .tag {
            display: inline-block; padding: 3px 10px; font-weight: 700;
            font-size: 0.75rem; border: 2px solid var(--border);
            border-radius: 20px; margin-right: 6px; margin-bottom: 6px;
        }
        .tag-benke { background: var(--blue); }
        .tag-zhuanke { background: var(--purple); }
        .tag-gongban { background: var(--green); }
        .tag-minban { background: var(--pink); }
        .tag-tiqian { background: var(--yellow); }

        .fav-btn {
            position: absolute; top: 12px; right: 12px;
            background: var(--card-bg); border: 2px solid var(--border); border-radius: 50%;
            width: 36px; height: 36px; cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .fav-btn:hover { transform: scale(1.15); }
        .fav-btn.faved { background: var(--yellow); border-color: #D4A017; }

        .empty-msg { text-align: center; padding: 40px; color: var(--text-muted); font-size: 1.1rem; grid-column: 1/-1; }
        .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 1.2rem; }

        .disclaimer {
            background: var(--purple); border: var(--t) solid var(--border);
            border-radius: var(--r-sm); padding: 15px; font-weight: 600;
            box-shadow: 4px 4px 0 var(--shadow); text-align: center; font-size: 0.9rem; margin-top: 20px;
        }

        footer { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.85rem; }

        @media (max-width: 768px) {
            header h1 { font-size: 1.6rem; }
            .school-grid { grid-template-columns: 1fr; }
            .filter-row { gap: 6px; }
        }

        /* 按钮通用 Brutalist 样式 */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 20px; font-weight: 700; font-size: 0.9rem;
            border: var(--t) solid var(--border); border-radius: var(--r-sm);
            cursor: pointer; background: var(--card-bg); color: var(--text);
            transition: all 0.15s; text-decoration: none;
            box-shadow: 3px 3px 0 var(--shadow);
            outline: none;
        }
        .btn:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--shadow); }
        .btn:active { transform: translate(1px, 1px); box-shadow: 1.5px 1.5px 0 var(--shadow); }
        .btn-primary { background: var(--yellow); }
        .btn-sm { padding: 4px 10px; font-size: 0.75rem; border-width: 2px; }

        /* 模态框与底部抽屉 (Bottom Sheet) 样式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        
        .modal-card {
            background: var(--card-bg); border: var(--t) solid var(--border);
            border-radius: var(--r-md); padding: 25px; width: 90%; max-width: 502px;
            box-shadow: 6px 6px 0 var(--shadow); position: relative;
            transform: translateY(30px); transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--text);
        }
        .modal-overlay.show .modal-card { transform: translateY(0); }
        .modal-drag-handle { display: none; width: 45px; height: 5px; background: var(--text-muted); border-radius: 3px; margin: 0 auto 15px auto; opacity: 0.5; }
        .modal-close-btn {
            position: absolute; top: 15px; right: 15px; background: none; border: none;
            font-size: 1.8rem; cursor: pointer; color: var(--text); line-height: 1;
        }
        
        @media (max-width: 768px) {
            .modal-overlay { align-items: flex-end; }
            .modal-card {
                width: 100%; max-width: 100%; border-bottom: none; border-radius: var(--r-md) var(--r-md) 0 0;
                padding: 20px 20px 40px 20px; transform: translateY(100%);
                box-shadow: none; border-top: var(--t) solid var(--border);
                border-left: none; border-right: none;
            }
            .modal-overlay.show .modal-card { transform: translateY(0); }
            .modal-drag-handle { display: block; }
        }

        /* 移动端吸顶快捷成绩定位栏 */
        .sticky-bar {
            position: fixed; top: 0; left: 0; right: 0; background: var(--yellow);
            border-bottom: var(--t) solid var(--border); z-index: 900;
            padding: 10px 20px; transform: translateY(-100%); transition: transform 0.25s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: none;
            color: #242426; /* 始终使用深色字以保持高对比度 neobrutalist 视觉 */
        }
        .sticky-bar.show { transform: translateY(0); }
        .sticky-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .sticky-info { display: flex; gap: 15px; font-size: 0.9rem; font-weight: 700; }
        
        @media (max-width: 768px) {
            .sticky-bar { display: block; }
        }

        /* 免责声明气泡 */
        .disclaimer-badge {
            display: inline-block;
            padding: 10px 24px;
            background: #FFD2D2; /* 柔和红 */
            color: #242426;
            border: var(--t) solid var(--border);
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.95rem;
            box-shadow: 3px 3px 0 var(--shadow);
            letter-spacing: 0.5px;
        }
        .dark .disclaimer-badge {
            background: #E5534B; /* 深色下醒目的柔和红 */
            color: #FFFFFF;
        }

        /* 学费滑动条 Brutalist 美化 */
        #feeSlider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            height: 24px;
        }
        #feeSlider::-webkit-slider-runnable-track {
            background: var(--bg);
            border: var(--t) solid var(--border);
            border-radius: 10px;
            height: 12px;
            box-shadow: 2px 2px 0 var(--shadow);
        }
        #feeSlider::-moz-range-track {
            background: var(--bg);
            border: var(--t) solid var(--border);
            border-radius: 10px;
            height: 12px;
            box-shadow: 2px 2px 0 var(--shadow);
        }
        #feeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            margin-top: -6px;
            background-color: var(--yellow);
            border: var(--t) solid var(--border);
            border-radius: 50%;
            height: 20px;
            width: 20px;
            box-shadow: 2px 2px 0 var(--shadow);
            transition: all 0.15s;
        }
        #feeSlider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background-color: var(--pink);
        }
        #feeSlider::-moz-range-thumb {
            background-color: var(--yellow);
            border: var(--t) solid var(--border);
            border-radius: 50%;
            height: 20px;
            width: 20px;
            box-shadow: 2px 2px 0 var(--shadow);
            transition: all 0.15s;
        }
        #feeSlider::-moz-range-thumb:hover {
            transform: scale(1.2);
            background-color: var(--pink);
        }
    </style>
</head>
<body>
<div id="stickyHeader" class="sticky-bar">
    <div class="sticky-content">
        <span style="font-weight:800; font-size:0.95rem;">📊 网络技术成绩定位</span>
        <div class="sticky-info">
            <span>分数: <strong id="stickyScore">--</strong></span>
            <span>位次: <strong id="stickyRank" style="color:var(--accent);">--</strong></span>
        </div>
        <button class="btn btn-sm" onclick="scrollToControl()" style="padding: 4px 10px; font-size:0.75rem; margin:0; box-shadow:1.5px 1.5px 0 var(--shadow); background:var(--card-bg);">调整</button>
    </div>
</div>

<div class="container">
    <header>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换暗色模式">🌙</button>
        <h1>网络技术专业 · 可报院校</h1>
        <p>2026年春季高考招生计划</p>
        <div class="header-actions">
            <span class="disclaimer-badge">
                ⚠️ 数据由AI清洗，仅供参考
            </span>
        </div>
    </header>

    <div id="loadingMsg" class="loading">正在加载数据库...</div>

    <div id="mainContent" style="display: none;">
        <div class="card">
            <h2>智能匹配与过滤</h2>
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="输入院校名称或专业搜索...">
            </div>
            
            <div class="form-row">
                <div class="form-group" style="flex: 1.5; min-width: 250px;">
                    <label for="scoreInput">📊 输入春季高考分数（网络技术）</label>
                    <div style="display: flex; gap: 10px; align-items: stretch;">
                        <input type="number" id="scoreInput" class="form-input" placeholder="请输入您的分数（例如 560）" min="0" max="750" style="flex: 1; min-width: 0;">
                        <button class="btn" onclick="resetAllFilters()" style="background: var(--pink); color: var(--text); padding: 0 16px; font-size: 0.95rem; font-weight: 700; cursor: pointer; white-space: nowrap; border-radius: var(--r-sm); border: var(--t) solid var(--border); box-shadow: 3px 3px 0 var(--shadow); transition: all 0.15s;">
                            重置全部 ↩️
                        </button>
                    </div>
                </div>
                <div class="form-group" id="rankIndicatorWrapper" style="display: none; flex: 2; min-width: 280px;">
                    <label>全省参考位次看板</label>
                    <div class="rank-indicator">
                        <span>省位次：第 <span id="userRankVal" style="color:var(--accent); font-size:1.3rem;">--</span> 名</span>
                        <span style="border-left:2px solid var(--border); height:20px;"></span>
                        <span id="lineCompareVal">--</span>
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-row">
                    <span class="filter-label">智能推荐：</span>
                    <button class="filter-btn active" data-rec="all" onclick="setRecFilter('all', this)">全部院校</button>
                    <button class="filter-btn tag-chong" data-rec="chong" onclick="setRecFilter('chong', this)" style="display:none;">可冲 🔴</button>
                    <button class="filter-btn tag-wen" data-rec="wen" onclick="setRecFilter('wen', this)" style="display:none;">稳妥 🟢</button>
                    <button class="filter-btn tag-bao" data-rec="bao" onclick="setRecFilter('bao', this)" style="display:none;">保底 🔵</button>
                </div>
                
                <div class="filter-row">
                    <span class="filter-label">基础分类：</span>
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">全部</button>
                    <button class="filter-btn" data-filter="本科" onclick="setFilter('本科', this)">本科</button>
                    <button class="filter-btn" data-filter="专科" onclick="setFilter('专科', this)">专科</button>
                    <button class="filter-btn" data-filter="公办" onclick="setFilter('公办', this)">公办</button>
                    <button class="filter-btn" data-filter="民办" onclick="setFilter('民办', this)">民办</button>
                    <button class="filter-btn" data-filter="fav" onclick="setFilter('fav', this)">⭐ 仅收藏</button>
                </div>
                
                <div class="filter-row">
                    <span class="filter-label">学费上限：</span>
                    <input type="range" id="feeSlider" min="0" max="30000" step="500" value="30000" style="flex:1;" oninput="handleFeeSlider(this)">
                    <span id="feeLimitVal" style="font-weight:700; width:100px; text-align:right;">30,000 元</span>
                </div>

                <div class="sort-bar">
                    <span class="sort-label">排序方式：</span>
                    <button class="sort-btn active" onclick="setSort('rank', this)">参考位次↑</button>
                    <button class="sort-btn" onclick="setSort('rank_desc', this)">参考位次↓</button>
                    <button class="sort-btn" onclick="setSort('fee', this)">学费↑</button>
                    <button class="sort-btn" onclick="setSort('fee_desc', this)">学费↓</button>
                    <button class="sort-btn" onclick="setSort('plan', this)">计划数↓</button>
                    <button class="sort-btn" onclick="setSort('name', this)">校名</button>
                </div>
            </div>
            
            <div class="stat-bar" id="statBar"></div>
        </div>

        <div class="school-grid" id="schoolGrid"></div>

        <div class="disclaimer">
            ⚠️ 以上内容由 AI 自动从招生计划PDF中提取整理，仅供参考，请以山东省教育招生考试院官方发布为准。

    // 计算分数对应的省累计位次
    function getRankByScore(score) {
        if (score === null || isNaN(score)) return null;
        score = Math.max(0, Math.min(750, score));
        if (NET_TECH_SCORE_RANK[score] !== undefined) {
            return NET_TECH_SCORE_RANK[score];
        }
        // 模糊向下匹配
        const scores = Object.keys(NET_TECH_SCORE_RANK).map(Number).sort((a, b) => b - a);
        for (let s of scores) {
            if (score >= s) return NET_TECH_SCORE_RANK[s];
        }
        return NET_TECH_SCORE_RANK[scores[scores.length - 1]];
    }

    // 计算推荐档次
    function getRecommendLevel(schoolRefRank, userRank) {
        if (!schoolRefRank || schoolRefRank === 0) {
            return { label: '无历史参考', class: 'tag-none', level: 'none' };
        }
        if (!userRank) return null;
        
        // 动态计算冲、稳的位次阈值，避免高低分段出现空列表
        const chongLimit = Math.max(80, Math.round(userRank * 0.2));  // 可冲位次浮动范围
        const wenLimit = Math.max(200, Math.round(userRank * 0.4));   // 稳妥位次浮动范围
        
        const diff = schoolRefRank - userRank;
        
        if (diff < -chongLimit) {
            return { label: '难度极高', class: 'tag-hard', level: 'hard' };
        } else if (diff >= -chongLimit && diff < 0) {
            return { label: '可冲 🔴', class: 'tag-chong', level: 'chong' };
        } else if (diff >= 0 && diff < wenLimit) {
            return { label: '稳妥 🟢', class: 'tag-wen', level: 'wen' };
        } else {
            return { label: '保底 🔵', class: 'tag-bao', level: 'bao' };
        }
    }

    const FAV_KEY = 'spring_gaokao_favorites';
    const THEME_KEY = 'spring_gaokao_theme';

    let currentFilter = 'all';
    let currentSort = 'rank';
    let searchKeyword = '';

    // 暗色模式
    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark');
        localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
        document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
    }
    function initTheme() {
        const themeToggleBtn = document.querySelector('.theme-toggle');
        const localTheme = localStorage.getItem(THEME_KEY);
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (localTheme === 'dark' || (!localTheme && systemPrefersDark)) {
            document.body.classList.add('dark');
            if (themeToggleBtn) themeToggleBtn.textContent = '☀️';
        } else {
            document.body.classList.remove('dark');
            if (themeToggleBtn) themeToggleBtn.textContent = '🌙';
        }
    }
    
    // 监听系统主题变化自动同步
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!localStorage.getItem(THEME_KEY)) {
            const themeToggleBtn = document.querySelector('.theme-toggle');
            if (e.matches) {
                document.body.classList.add('dark');
                if (themeToggleBtn) themeToggleBtn.textContent = '☀️';
            } else {
                document.body.classList.remove('dark');
                if (themeToggleBtn) themeToggleBtn.textContent = '🌙';
            }
        }
    });

    // 收藏
    function getFavs() {
        try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch { return []; }
    }
    function saveFavs(favs) { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }
    function isFav(id) { return getFavs().includes(id); }
    function toggleFav(id) {
        let favs = getFavs();
        if (favs.includes(id)) { favs = favs.filter(f => f !== id); }
        else { favs.push(id); }
        saveFavs(favs);
        render();
    }
    function showFavOnly() {
        currentFilter = 'fav';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-filter="fav"]').classList.add('active');
        render();
    }

    async function init() {
        initTheme();
        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
            const resp = await fetch('data/gaokao.db');
            const buf = await resp.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buf));

            const res = db.exec('SELECT * FROM school ORDER BY fee');
            allSchools = res[0].values.map(r => ({
                id: r[0], batch: r[1], code: r[2], name: r[3], major: r[4],
                type: r[5], years: r[6], plan_count: r[7], fee: r[8], note: r[9],
                ref_score: r[10] || 0, ref_rank: r[11] || 0
            }));

            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            render();
        } catch (e) {
            console.error(e);
            document.getElementById('loadingMsg').textContent = '加载失败，请通过HTTP访问并确保 data/gaokao.db 存在';
        }
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }
    function setSort(s, btn) {
        currentSort = s;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    let userScore = null;
    let userRank = null;
    let recFilter = 'all';
    let maxFeeLimit = 30000;

    // 绑定成绩输入框事件
    document.getElementById('scoreInput').addEventListener('input', function() {
        const val = parseInt(this.value.trim());
        if (isNaN(val) || val <= 0) {
            userScore = null;
            userRank = null;
            document.getElementById('rankIndicatorWrapper').style.display = 'none';
            document.querySelectorAll('.filter-btn[data-rec]').forEach(b => {
                if (b.dataset.rec !== 'all') b.style.display = 'none';
            });
            recFilter = 'all';
            document.querySelectorAll('.filter-btn[data-rec]').forEach(b => b.classList.remove('active'));
            document.querySelector('.filter-btn[data-rec="all"]').classList.add('active');
        } else {
            userScore = val;
            userRank = getRankByScore(val);
            document.getElementById('userRankVal').textContent = userRank;
            
            // 本科控制线 491 分
            const lineCompare = document.getElementById('lineCompareVal');
            if (val >= 491) {
                lineCompare.textContent = '已过本科线';
                lineCompare.style.color = 'var(--tag-wen-text)';
            } else {
                lineCompare.textContent = '未过本科线';
                lineCompare.style.color = 'var(--tag-chong-text)';
            }
            document.getElementById('rankIndicatorWrapper').style.display = 'block';
            
            // 显示推荐按钮
            document.querySelectorAll('.filter-btn[data-rec]').forEach(b => {
                b.style.display = 'inline-block';
            });
        }
        render();
    });

    function handleFeeSlider(slider) {
        maxFeeLimit = parseInt(slider.value);
        document.getElementById('feeLimitVal').textContent = maxFeeLimit.toLocaleString() + ' 元';
        render();
    }

    function setRecFilter(rec, btn) {
        recFilter = rec;
        document.querySelectorAll('.filter-btn[data-rec]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function getFiltered() {
        let list = allSchools;
        const favs = getFavs();

        // 1. 基础批次与性质过滤
        if (currentFilter === '本科') list = list.filter(s => s.batch !== '专科批');
        else if (currentFilter === '专科') list = list.filter(s => s.batch === '专科批');
        else if (currentFilter === '公办') list = list.filter(s => s.type === '公办');
        else if (currentFilter === '民办') list = list.filter(s => s.type === '民办');
        else if (currentFilter === 'fav') list = list.filter(s => favs.includes(s.id));

        // 2. 学费过滤
        list = list.filter(s => (s.fee || 0) <= maxFeeLimit);

        // 3. 关键字搜索过滤
        if (searchKeyword) {
            list = list.filter(s => s.name.includes(searchKeyword) || s.major.includes(searchKeyword));
        }

        // 4. 成绩及推荐档次过滤
        if (userRank !== null) {
            list = list.map(s => {
                const rec = getRecommendLevel(s.ref_rank, userRank);
                return { ...s, _rec: rec };
            });
            
            // 如果是选择特定推荐分类，进行筛选；否则全部显示，保留“难度极高”在全部列表中的可见性
            if (recFilter !== 'all') {
                list = list.filter(s => s._rec && s._rec.level === recFilter);
            }
        } else {
            list = list.map(s => {
                return { ...s, _rec: null };
            });
        }

        // 5. 排序逻辑
        if (currentSort === 'fee') list.sort((a, b) => (a.fee || 999999) - (b.fee || 999999));
        else if (currentSort === 'fee_desc') list.sort((a, b) => (b.fee || 0) - (a.fee || 0));
        else if (currentSort === 'plan') list.sort((a, b) => b.plan_count - a.plan_count);
        else if (currentSort === 'name') list.sort((a, b) => a.name.localeCompare(b.name));
        else if (currentSort === 'rank') list.sort((a, b) => {
            if (a.ref_rank === 0 && b.ref_rank === 0) return 0;
            if (a.ref_rank === 0) return 1;
            if (b.ref_rank === 0) return -1;
            return a.ref_rank - b.ref_rank;
        });
        else if (currentSort === 'rank_desc') list.sort((a, b) => {
            if (a.ref_rank === 0 && b.ref_rank === 0) return 0;
            if (a.ref_rank === 0) return 1;
            if (b.ref_rank === 0) return -1;
            return b.ref_rank - a.ref_rank;
        });

        return list;
    }

    function render() {
        const list = getFiltered();
        const total = list.length;
        const benke = list.filter(s => s.batch !== '专科批').length;
        const zhuanke = total - benke;
        const gongban = list.filter(s => s.type === '公办').length;
        const minban = total - gongban;
        const favCount = getFavs().length;

        document.getElementById('statBar').innerHTML = `
            <span class="stat-item">共 <span class="stat-num">${total}</span> 个专业</span>
            <span class="stat-item">本科 <span class="stat-num">${benke}</span></span>
            <span class="stat-item">专科 <span class="stat-num">${zhuanke}</span></span>
            <span class="stat-item">公办 <span class="stat-num">${gongban}</span></span>
            <span class="stat-item">民办 <span class="stat-num">${minban}</span></span>
            <span class="stat-item">已收藏 <span class="stat-num">${favCount}</span></span>
        `;

        const grid = document.getElementById('schoolGrid');
        if (total === 0) {
            const msg = currentFilter === 'fav' ? '还没有收藏院校，点击卡片右上角 ⭐ 收藏' : '暂无匹配的院校数据';
            grid.innerHTML = `<div class="empty-msg">${msg}</div>`;
            return;
        }

        grid.innerHTML = list.map(s => {
            const isBenke = s.batch !== '专科批';
            const batchLabel = s.batch === '本科提前批' ? '提前批' : (isBenke ? '本科' : '专科');
            const batchClass = s.batch === '本科提前批' ? 'tag-tiqian' : (isBenke ? 'tag-benke' : 'tag-zhuanke');
            const typeClass = s.type === '公办' ? 'tag-gongban' : 'tag-minban';
            const feeStr = s.fee > 0 ? `<div class="school-fee">💰 ${s.fee.toLocaleString()} 元/年</div>` : '<div class="school-fee" style="color:var(--text-muted);">💰 暂无学费数据</div>';
            const noteStr = s.note ? `<div class="school-note">⚠️ 备注: ${s.note}</div>` : '';
            const faved = isFav(s.id);

            // 渲染往年参考排名与智能匹配徽章
            let rankHtml = '';
            if (s._rec) {
                rankHtml = `<div class="rank-highlight ${s._rec.class}">往年参考名次: ${s.ref_rank} (推荐档次: ${s._rec.label})</div>`;
            } else {
                rankHtml = s.ref_rank > 0 
                    ? `<div class="rank-highlight">往年参考名次: ${s.ref_rank} · 参考分 ${s.ref_score}</div>`
                    : `<div class="no-rank">暂无参考名次</div>`;
            }

            return `<div class="school-card" onclick="showDetail(${s.id})">
                <button class="fav-btn ${faved ? 'faved' : ''}" onclick="event.stopPropagation();toggleFav(${s.id})" title="${faved ? '取消收藏' : '收藏'}">${faved ? '★' : '☆'}</button>
                <div class="school-header">
                    <div class="school-name">
                        ${s.name}
                        <span class="school-code">${s.code}</span>
                    </div>
                </div>
                <div style="margin-bottom: 10px;"><span class="tag ${batchClass}">${batchLabel}</span><span class="tag ${typeClass}">${s.type}</span></div>
                <div class="major-highlight">${s.major}</div>
                <div class="school-info">
                    <div>⏱️ 修业年限：<strong>${s.years}年制</strong></div>
                    <div>👥 招生计划：<strong>${s.plan_count}人</strong></div>
                    ${noteStr}
                </div>
                ${rankHtml}
                ${feeStr}
            </div>`;
        }).join('');
    }

    document.getElementById('searchInput').addEventListener('input', function() {
        searchKeyword = this.value.trim();
        render();
    });

    function showDetail(id) {
        const s = allSchools.find(x => x.id === id);
        if (!s) return;
        
        const isBenke = s.batch !== '专科批';
        const typeClass = s.type === '公办' ? 'tag-gongban' : 'tag-minban';
        const batchClass = s.batch === '本科提前批' ? 'tag-tiqian' : (isBenke ? 'tag-benke' : 'tag-zhuanke');
        const feeText = s.fee > 0 ? `${s.fee.toLocaleString()} 元/年` : '待定';
        
        let rankText = '';
        if (userRank) {
            const rec = getRecommendLevel(s.ref_rank, userRank);
            rankText = `<div class="rank-highlight ${rec.class}" style="margin: 15px 0;">往年参考名次: ${s.ref_rank} (${rec.label})</div>`;
        } else {
            rankText = s.ref_rank > 0 
                ? `<div class="rank-highlight" style="margin: 15px 0;">往年参考名次: ${s.ref_rank} · 参考分 ${s.ref_score}</div>`
                : `<div class="no-rank" style="margin: 15px 0;">暂无往年参考名次</div>`;
        }

        const html = `
            <h3 style="font-size: 1.4rem; font-weight: 800; margin-bottom: 10px; padding-right: 25px;">${s.name}</h3>
            <div style="margin-bottom: 15px;">
                <span class="tag tag-none">代码: ${s.code}</span>
                <span class="tag ${batchClass}">${s.batch}</span>
                <span class="tag ${typeClass}">${s.type}</span>
            </div>
            <div class="major-highlight" style="font-size:1.1rem; width:100%; display:block; text-align:center;">${s.major}</div>
            
            <div style="margin-top: 20px; line-height: 2; font-size: 0.95rem; border-top: 1.5px dashed var(--border); padding-top: 15px;">
                <div>⏱️ <strong>修业年限</strong>：${s.years} 年制</div>
                <div>👥 <strong>招生计划</strong>：${s.plan_count} 人</div>
                <div>💰 <strong>学费标准</strong>：<span style="color:var(--accent); font-weight:800;">${feeText}</span></div>
                ${s.note ? `<div style="color:var(--accent); font-weight:700; margin-top: 10px; background: rgba(229, 83, 75, 0.06); padding: 6px 12px; border-radius: 6px; border: 1.5px dashed var(--accent);">⚠️ <strong>专业备注</strong>：${s.note}</div>` : ''}
            </div>
            ${rankText}
            <div style="margin-top:25px; display:flex; gap:10px;">
                <button class="btn btn-primary" style="flex:1;" onclick="copyInfo('${s.name}', '${s.code}', '${s.major}', '${feeText}')">📋 复制主要信息</button>
                <button class="btn" style="flex:1;" onclick="toggleFav(${s.id}); closeDetail();">⭐ ${isFav(s.id) ? '取消收藏' : '加入收藏'}</button>
            </div>
        `;
        
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('detailModal').classList.add('show');
    }
    
    function closeDetail() {
        document.getElementById('detailModal').classList.remove('show');
    }
    
    function copyInfo(name, code, major, fee) {
        const text = `【院校】${name} (代码: ${code})\n【专业】${major}\n【学费】${fee}\n——数据来源：2026春考院校助手`;
        navigator.clipboard.writeText(text).then(() => {
            alert('信息已成功复制到剪贴板！');
        }).catch(err => {
            alert('复制失败，请手动选择复制。');
        });
    }

    // 监听滚动展示吸顶成绩栏
    window.addEventListener('scroll', function() {
        const controlCard = document.querySelector('.card');
        const stickyHeader = document.getElementById('stickyHeader');
        if (!controlCard || !stickyHeader || userScore === null) {
            stickyHeader.classList.remove('show');
            return;
        }
        
        const rect = controlCard.getBoundingClientRect();
        if (rect.bottom < 0) {
            stickyHeader.classList.add('show');
            document.getElementById('stickyScore').textContent = userScore;
            document.getElementById('stickyRank').textContent = userRank;
        } else {
            stickyHeader.classList.remove('show');
        }
    });
    
    function scrollToControl() {
        const controlCard = document.querySelector('.card');
        if (controlCard) {
            controlCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function quickFillScore(score) {
        const scoreInput = document.getElementById('scoreInput');
        if (scoreInput) {
            scoreInput.value = score;
            scoreInput.dispatchEvent(new Event('input'));
        }
    }

    function resetAllFilters() {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = '';
        searchKeyword = '';
        
        const scoreInput = document.getElementById('scoreInput');
        if (scoreInput) {
            scoreInput.value = '';
            scoreInput.dispatchEvent(new Event('input'));
        }
        
        const feeSlider = document.getElementById('feeSlider');
        if (feeSlider) {
            feeSlider.value = 30000;
            handleFeeSlider(feeSlider);
        }
        
        currentFilter = 'all';
        recFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach(b => {
            if (b.dataset.filter === 'all' || b.dataset.rec === 'all') {
                b.classList.add('active');
            } else {
                b.classList.remove('active');
            }
        });
        
        render();
    }

    init();
</script>
<div id="detailModal" class="modal-overlay" onclick="closeDetail()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-drag-handle"></div>
        <button class="modal-close-btn" onclick="closeDetail()">×</button>
        <div id="modalContent"></div>
    </div>
</div>
</body>
</html>
